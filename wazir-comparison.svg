<!-- Text -->
<text x="182" y="268" font-family="'Caveat','Comic Sans MS',cursive" font-size="22" font-weight="700" fill="#1C1917">Reviews its own code</text>
<text x="182" y="292" font-family="'Caveat','Comic Sans MS',cursive" font-size="16" fill="#78716C">No independent check — blind to its own bugs</text>

<!-- ────────────────────────────────────────── -->
<!-- ROW 2  y_center=362  "Skips clarification" -->
