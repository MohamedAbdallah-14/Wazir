</g>
<!-- Red X -->
<line x1="138" y1="618" x2="162" y2="646" stroke="#EF4444" stroke-width="3.5" stroke-linecap="round" filter="url(#roughSm)"/>
<line x1="162" y1="618" x2="138" y2="646" stroke="#EF4444" stroke-width="3.5" stroke-linecap="round" filter="url(#roughSm)"/>
<!-- Text -->
<text x="182" y="628" font-family="'Caveat','Comic Sans MS',cursive" font-size="22" font-weight="700" fill="#1C1917">No structure, no gates</text>
<text x="182" y="652" font-family="'Caveat','Comic Sans MS',cursive" font-size="16" fill="#78716C">Raw prompting with zero guardrails</text>

