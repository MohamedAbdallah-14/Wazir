<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 788" width="1400" height="788">
<defs>
  <!-- Sketch / hand-drawn displacement filter -->
  <filter id="rough" x="-4%" y="-10%" width="108%" height="120%">
    <feTurbulence type="fractalNoise" baseFrequency="0.028 0.055" numOctaves="3" seed="2" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="roughSm" x="-3%" y="-8%" width="106%" height="116%">
    <feTurbulence type="fractalNoise" baseFrequency="0.022 0.045" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs>

<!-- ============================================================ -->
<!-- BACKGROUNDS                                                   -->
<!-- ============================================================ -->
<rect width="1400" height="788" fill="#FEFCFB"/>
<!-- Left warm tint -->
<rect x="0" y="0" width="700" height="788" fill="#FFFAF8"/>
<!-- Right cool tint -->
<rect x="700" y="0" width="700" height="788" fill="#F4FFFD"/>
<!-- Outer border -->
<rect x="5" y="5" width="1390" height="778" rx="14" fill="none" stroke="#D1D5DB" stroke-width="2" filter="url(#rough)"/>
<!-- Center divider -->
<line x1="700" y1="14" x2="700" y2="774" stroke="#CBD5E1" stroke-width="2.5" stroke-dasharray="10,6" filter="url(#roughSm)"/>

<!-- ============================================================ -->
<!-- LEFT PANEL — Without Wazir                                   -->
<!-- ============================================================ -->

