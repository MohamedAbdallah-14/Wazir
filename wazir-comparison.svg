<line x1="138" y1="528" x2="162" y2="556" stroke="#EF4444" stroke-width="3.5" stroke-linecap="round" filter="url(#roughSm)"/>
<line x1="162" y1="528" x2="138" y2="556" stroke="#EF4444" stroke-width="3.5" stroke-linecap="round" filter="url(#roughSm)"/>
