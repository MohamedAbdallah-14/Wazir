<text x="182" y="382" font-family="'Caveat','Comic Sans MS',cursive" font-size="16" fill="#78716C">Dives in before understanding the problem</text>

<!-- ─────────────────────────────────────────────────── -->
<!-- ROW 3  y_center=452  "Declares 'done' without proof" -->
<!-- ─────────────────────────────────────────────────── -->
