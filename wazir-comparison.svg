      font-size="34" font-weight="700" fill="#DC2626">Without Wazir</text>

<!-- ─── AI ROBOT ICON ─── -->
<!-- Antenna -->
<line x1="348" y1="107" x2="348" y2="93" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="348" cy="88" r="7" fill="#EF4444" opacity="0.85"/>
