      font-size="14" fill="#92400E" opacity="0.9">solo AI agent</text>

<!-- Separator -->
<line x1="42" y1="232" x2="658" y2="232" stroke="#FECACA" stroke-width="1.5" filter="url(#roughSm)"/>

<!-- ─────────────────────────────────────────── -->
<!-- ROW 1  y_center=272  "Reviews its own code" -->
