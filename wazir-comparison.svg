<path d="M 60,437 L 82,429 L 82,470 L 60,462 Z" fill="#F97316" opacity="0.88" filter="url(#roughSm)"/>
<path d="M 82,431 Q 110,416 112,450 Q 110,474 82,468" fill="#F97316" opacity="0.48" filter="url(#roughSm)"/>
